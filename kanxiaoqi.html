<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>砍小器</title>
<style>
:root{
  --bg:#E9EDEA; --surface:#FFFFFF; --surface-soft:#F4F6F3;
  --ink:#2B3A35; --muted:#9AA8A1; --line:#DCE3DF;
  --accent:#4F9277; --accent-press:#447F68; --accent-soft:#E2EFE8;
  --radius:20px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC","Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg);color:var(--ink);font-family:var(--font);
  -webkit-font-smoothing:antialiased;line-height:1.55;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:440px}
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:38px 30px;
  box-shadow:0 16px 46px -26px rgba(43,58,53,.5);
}
.top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;gap:12px}
.brand{display:flex;flex-direction:column;gap:3px}
.brand .name{display:flex;align-items:center;gap:9px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.brand b{font-size:1rem;letter-spacing:.02em;color:var(--ink);font-weight:700}
.brand .sub{font-size:.74rem;color:var(--muted);padding-left:17px;letter-spacing:.01em}
.recbtn{display:flex;flex-direction:column;align-items:flex-end;gap:5px;background:none;border:none;cursor:pointer;font-family:inherit;padding:2px;margin-top:2px}
.recbtn .lbl{font-size:.72rem;color:var(--muted);font-weight:600}
.recbtn:hover .lbl{color:var(--accent)}
.streak-dots{display:flex;gap:5px;align-items:center}
.sd{width:8px;height:8px;border-radius:50%;background:var(--line)}
.sd.on{background:var(--accent)}
.streak-num{font-size:.72rem;color:var(--muted);margin-left:4px}

/* 我的记录 页 */
.rec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.rec-back{background:none;border:none;color:var(--muted);font-family:inherit;font-size:.9rem;cursor:pointer;padding:4px}
.rec-back:hover{color:var(--ink)}
.rec-title{font-size:1.06rem;font-weight:600}
.rec-stats{display:flex;gap:26px;margin-bottom:24px}
.rec-stats .n{font-size:1.7rem;font-weight:700;color:var(--accent);line-height:1.1}
.rec-stats .k{font-size:.74rem;color:var(--muted);margin-top:3px}
.cal-month{font-size:.82rem;color:var(--muted);margin-bottom:10px;font-weight:600}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.cal .wd{font-size:.66rem;color:var(--muted);text-align:center;padding-bottom:2px}
.cal .d{aspect-ratio:1;border-radius:9px;background:var(--surface-soft);
  display:flex;align-items:center;justify-content:center;font-size:.74rem;color:var(--muted)}
.cal .d.empty{background:none}
.cal .d.on{background:var(--accent);color:#fff;font-weight:600}
.cal .d.today{box-shadow:0 0 0 2px var(--accent-soft) inset,0 0 0 2px var(--accent)}
.rec-sum{margin-top:22px;color:var(--muted);font-size:.9rem;text-align:center;line-height:1.6}

.prompt{font-size:1.18rem;font-weight:600;margin:0 0 16px;line-height:1.45}
.mins{display:inline-flex;gap:6px;margin:0 0 20px}
.mins button{
  border:1px solid var(--line);background:var(--surface-soft);color:var(--muted);
  border-radius:999px;padding:5px 15px;font-family:inherit;font-size:.82rem;cursor:pointer;transition:.15s;
}
.mins button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}

textarea,input[type=text]{
  width:100%;font-family:inherit;font-size:1.02rem;color:var(--ink);
  background:var(--surface-soft);border:1px solid var(--line);
  border-radius:14px;padding:15px;resize:none;line-height:1.55;
  transition:border-color .15s,background .15s;
}
textarea{min-height:104px}
textarea:focus,input:focus{outline:none;border-color:var(--accent);background:#fff}
.btn{
  margin-top:22px;width:100%;border:none;cursor:pointer;font-family:inherit;
  font-size:1.02rem;font-weight:600;color:#fff;background:var(--accent);
  padding:15px;border-radius:14px;transition:background .15s,transform .06s;
}
.btn:hover{background:var(--accent-press)}
.btn:active{transform:translateY(1px)}
.btn:disabled{background:#C6D2CC;cursor:not-allowed}
.btn.ghost{background:none;color:var(--muted);font-weight:500;margin-top:6px;padding:9px;font-size:.86rem}
.btn.ghost:hover{color:var(--ink)}

.parked{font-size:.82rem;color:var(--muted);margin:0 0 16px}
.parked b{color:var(--accent);font-weight:600}

.steprow{display:flex;gap:8px;margin-bottom:9px}
.steprow input{flex:1}
.steprow .del{
  border:1px solid var(--line);background:var(--surface-soft);color:var(--muted);
  border-radius:11px;width:44px;flex:none;cursor:pointer;font-size:1.1rem;
}
.steprow .del:hover{color:var(--ink)}
.addstep{
  background:none;border:1px dashed var(--line);color:var(--muted);
  width:100%;border-radius:11px;padding:10px;cursor:pointer;font-family:inherit;
  font-size:.84rem;margin-top:3px;transition:.15s;
}
.addstep:hover{color:var(--accent);border-color:var(--accent)}

.task{display:flex;align-items:flex-start;gap:13px;padding:15px 0;border-bottom:1px solid var(--line)}
.task:first-child{padding-top:4px}
.task:last-of-type{border-bottom:none}
.check-btn{
  flex:none;width:28px;height:28px;border-radius:50%;border:2px solid var(--line);
  background:none;cursor:pointer;margin-top:2px;transition:.18s;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;
}
.check-btn:active{transform:scale(.85)}
.check-btn.on{background:var(--accent);border-color:var(--accent);animation:tick .3s ease}
@keyframes tick{0%{transform:scale(.7)}55%{transform:scale(1.18)}100%{transform:scale(1)}}
.task .t{font-size:1.16rem;font-weight:600;line-height:1.45}
.task.done .t{color:var(--muted);text-decoration:line-through}

.win{text-align:center}
.win .check{
  width:58px;height:58px;border-radius:50%;background:var(--accent-soft);
  color:var(--accent);display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin:0 auto 18px;animation:pop .45s cubic-bezier(.2,1.3,.4,1) both;
}
@keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
.win h2{margin:0 0 8px;font-size:1.32rem}
.win .line{color:var(--muted);margin:0;font-size:.96rem;line-height:1.6}
.win .streak{font-size:.82rem;color:var(--accent);font-weight:600;margin-top:18px}

.stage{display:none;animation:rise .35s ease both}
[data-stage="1"] .s1{display:block}
[data-stage="2"] .s2{display:block}
[data-stage="3"] .s3{display:block}
[data-stage="4"] .s4{display:block}
[data-stage="5"] .s5{display:block}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.stage,.win .check,.check-btn.on{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card" data-stage="1">
    <div class="top">
      <div class="brand">
        <span class="name"><span class="dot"></span><b>砍小器</b></span>
        <span class="sub">用行为科学,帮高敏感的你,慢慢开始</span>
      </div>
      <button class="recbtn" id="openRec">
        <span class="lbl">我的记录 ›</span>
        <span class="streak-dots" id="streakDots"></span>
      </button>
    </div>

    <div class="stage s1">
      <p class="prompt">你急着想做、又动不了的那件事,是什么?</p>
      <textarea id="bigThing" placeholder="把它写下来……"></textarea>
      <button class="btn" id="toStep" disabled>砍小它</button>
    </div>

    <div class="stage s2">
      <p class="parked">先放下:<b id="parked2"></b></p>
      <p class="prompt"><span id="mins">1</span> 分钟能做完的最小一步?</p>
      <div class="mins">
        <button data-m="1" class="on">1 分钟</button>
        <button data-m="3">3 分钟</button>
      </div>
      <div id="steps"></div>
      <button class="addstep" id="addStep">+ 再拆一小步</button>
      <button class="btn" id="toDo" disabled>就这些</button>
      <button class="btn ghost" id="back1">换一件事</button>
    </div>

    <div class="stage s3">
      <div id="taskList"></div>
      <button class="btn" id="finish">我做完了</button>
      <button class="btn ghost" id="back2">再砍小一点</button>
    </div>

    <div class="stage s4 win">
      <div class="check">✓</div>
      <h2 id="winTitle">小胜 +1</h2>
      <p class="line" id="winLine"></p>
      <p class="streak" id="streak"></p>
      <button class="btn" id="again">再砍一件</button>
      <button class="btn ghost" id="rest">歇会儿</button>
    </div>

    <div class="stage s5">
      <div class="rec-head">
        <span class="rec-title">我的记录</span>
        <button class="rec-back" id="recBack">← 返回</button>
      </div>
      <div class="rec-stats">
        <div><div class="n" id="recTotal">0</div><div class="k">累计小胜</div></div>
        <div><div class="n" id="recStreak">0</div><div class="k">连续天数</div></div>
      </div>
      <div class="cal-month" id="calMonth"></div>
      <div class="cal" id="cal"></div>
      <p class="rec-sum" id="recSum"></p>
    </div>
  </div>
</div>

<script>
(function(){
  const KEY='kanxiaoqi_v4';
  const card=document.getElementById('card');
  const big=document.getElementById('bigThing');
  const toStep=document.getElementById('toStep');
  const toDo=document.getElementById('toDo');
  const stepsBox=document.getElementById('steps');
  const taskList=document.getElementById('taskList');
  const go=n=>card.dataset.stage=n;
  const day=d=>new Date(d).toLocaleDateString('sv');

  function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch(e){return null}}
  function save(d){try{localStorage.setItem(KEY,JSON.stringify(d))}catch(e){}}
  let data=load()||{total:0,streak:0,lastDay:'',days:{}};
  if(!data.days)data.days={};

  function buzz(){try{if(navigator.vibrate)navigator.vibrate(12)}catch(e){}}

  // 分钟切换
  document.querySelectorAll('.mins button').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.mins button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      document.getElementById('mins').textContent=b.dataset.m;
    };
  });

  function renderStreak(){
    const box=document.getElementById('streakDots'); box.innerHTML='';
    const n=Math.min(data.streak,7);
    for(let i=0;i<7;i++){const s=document.createElement('span');s.className='sd'+(i<n?' on':'');box.appendChild(s);}
    if(data.streak>0){const t=document.createElement('span');t.className='streak-num';t.textContent='连续'+data.streak+'天';box.appendChild(t);}
  }
  renderStreak();

  function recordWin(){
    const t=day(Date.now());
    if(data.lastDay!==t){
      const y=day(Date.now()-864e5);
      data.streak=(data.lastDay===y)?data.streak+1:1;
      data.lastDay=t;
    }
    data.total+=1;
    data.days[t]=(data.days[t]||0)+1;
    save(data); renderStreak();
  }

  // 我的记录:渲染日历 + 统计
  function openRecord(){
    document.getElementById('recTotal').textContent=data.total;
    document.getElementById('recStreak').textContent=data.streak;
    const now=new Date();
    const Y=now.getFullYear(), M=now.getMonth();
    document.getElementById('calMonth').textContent=Y+' 年 '+(M+1)+' 月';
    const first=new Date(Y,M,1).getDay();
    const lead=(first+6)%7;
    const dim=new Date(Y,M+1,0).getDate();
    const todayStr=day(Date.now());
    const cal=document.getElementById('cal'); cal.innerHTML='';
    ['一','二','三','四','五','六','日'].forEach(w=>{
      const e=document.createElement('div');e.className='wd';e.textContent=w;cal.appendChild(e);
    });
    for(let i=0;i<lead;i++){const e=document.createElement('div');e.className='d empty';cal.appendChild(e);}
    let active=0;
    for(let dnum=1;dnum<=dim;dnum++){
      const ds=Y+'-'+String(M+1).padStart(2,'0')+'-'+String(dnum).padStart(2,'0');
      const e=document.createElement('div');e.className='d';e.textContent=dnum;
      if(data.days[ds]){e.classList.add('on');active++;}
      if(ds===todayStr)e.classList.add('today');
      cal.appendChild(e);
    }
    document.getElementById('recSum').textContent = active>0
      ? '这个月,你动过 '+active+' 天。看,亮了这么多。'
      : '这个月还空着——做一件小事,就点亮第一格。';
    go(5);
  }
  document.getElementById('openRec').onclick=openRecord;
  document.getElementById('recBack').onclick=()=>go(1);

  function addStepInput(){
    const row=document.createElement('div');row.className='steprow';
    row.innerHTML='<input type="text" placeholder="小到懒得拦你……"><button class="del" title="删掉">×</button>';
    const inp=row.querySelector('input');
    inp.addEventListener('input',checkSteps);
    row.querySelector('.del').onclick=()=>{row.remove();checkSteps();};
    stepsBox.appendChild(row);return inp;
  }
  const stepVals=()=>[...stepsBox.querySelectorAll('input')].map(i=>i.value.trim()).filter(Boolean);
  function checkSteps(){toDo.disabled=stepVals().length===0}

  big.addEventListener('input',()=>toStep.disabled=!big.value.trim());
  toStep.onclick=()=>{document.getElementById('parked2').textContent=big.value.trim();stepsBox.innerHTML='';const f=addStepInput();go(2);setTimeout(()=>f.focus(),60);};
  document.getElementById('addStep').onclick=()=>addStepInput().focus();
  document.getElementById('back1').onclick=()=>{go(1);big.focus();};

  toDo.onclick=()=>{
    taskList.innerHTML='';
    stepVals().forEach(v=>{
      const t=document.createElement('div');t.className='task';
      t.innerHTML='<button class="check-btn">✓</button><div class="t"></div>';
      t.querySelector('.t').textContent=v;
      t.querySelector('.check-btn').onclick=function(){this.classList.toggle('on');t.classList.toggle('done');buzz();};
      taskList.appendChild(t);
    });
    go(3);
  };
  document.getElementById('back2').onclick=()=>go(2);

  const lines=['够了。这一步,就是今天的种树。','你刚刚让一件事,真的发生了。','一手打对了——引擎松开,车动了一下。','怕还在,但你照做了。这,就是赢。','又一锹。根,在往下扎。'];
  document.getElementById('finish').onclick=()=>{
    recordWin();buzz();
    document.getElementById('winTitle').textContent='小胜 +1';
    document.getElementById('winLine').textContent=lines[(data.total-1)%lines.length];
    document.getElementById('streak').textContent='累计 '+data.total+' 个小胜'+(data.streak>1?' · 连续 '+data.streak+' 天没断':'');
    go(4);
  };
  document.getElementById('again').onclick=()=>{big.value='';toStep.disabled=true;toDo.disabled=true;go(1);big.focus();};
  document.getElementById('rest').onclick=()=>{
    document.getElementById('winTitle').textContent='去歇着吧';
    document.getElementById('winLine').textContent='你今天已经动了。剩下的,交给明天那一步。';
  };
})();
</script>
</body>
</html>
